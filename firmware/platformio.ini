; ============================================================
; HUMANOID ROBOT — PlatformIO Configuration (ROS2 Jazzy)
; ============================================================
;
; IMPORTANT — How micro-ROS works in PlatformIO:
;
; There is NO jazzy branch in micro_ros_platformio.
; The repo only has 'main'. The ROS2 distro is selected via:
;   board_microros_distro = jazzy
; which is a build-time flag read by the library's SCons scripts.
;
; On first 'pio run', PlatformIO will automatically:
;   1. Download micro_ros_platformio from GitHub (main branch)
;   2. Detect board_microros_distro = jazzy
;   3. Pull a Docker builder image and compile micro-ROS for ESP32
;   4. Cache the compiled library — future builds are instant
;
; PREREQUISITE: Docker must be installed and running.
;   sudo apt install docker.io
;   sudo systemctl start docker
;   sudo usermod -aG docker $USER  (then log out and back in)
;   docker --version               (verify)
;
; BUILD COMMANDS:
;   pio run                        → compile (first run ~10min, subsequent: seconds)
;   pio run --target upload        → compile + flash ESP32
;   pio run -t upload && pio device monitor  → flash + monitor
;   pio device monitor             → serial monitor (115200 baud)
;   pio device list                → list serial ports
;
; ============================================================

[env:esp32dev]

platform  = espressif32
board     = esp32dev
framework = arduino

upload_speed  = 921600
monitor_speed = 115200

; ── micro-ROS distro and transport ───────────────────────
; board_microros_distro: jazzy (your ROS2 version)
; board_microros_transport: wifi_udp (no USB cable while walking)
; Agent command: ros2 run micro_ros_agent micro_ros_agent udp4 --port 8888
board_microros_distro    = jazzy
board_microros_transport = wifi_udp

; ── Libraries ────────────────────────────────────────────
; micro_ros_platformio: auto-downloaded from GitHub main branch.
; DO NOT manually clone — PlatformIO and Docker handle everything.
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1
    adafruit/Adafruit MPU6050                  @ ^2.2.6
    adafruit/Adafruit Unified Sensor           @ ^1.1.14
    adafruit/Adafruit BusIO                    @ ^1.16.1

; ── Partition scheme ─────────────────────────────────────
; micro-ROS is large. huge_app.csv gives 3MB to the app.
; Without this: "region iram0_0_seg overflowed" linker error.
board_build.partitions = huge_app.csv

; ── Build flags ──────────────────────────────────────────
build_flags =
    -DCONFIG_MICRO_ROS_APP_STACK=16000
    -DCONFIG_MICRO_ROS_APP_TASK_PRIO=5
    -O2
    -I .pio/libdeps/esp32dev/micro_ros_platformio/platform_code/arduino/wifi
    -I .pio/libdeps/esp32dev/micro_ros_platformio/libmicroros/include
; ── Monitor filters ──────────────────────────────────────
monitor_filters = colorize, time